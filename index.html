<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Roguelike RPG with Voice</title>
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-card: #151824;
            --bg-input: #1e2235;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --color-hp: #ef4444;
            --color-exp: #10b981;
            --color-gold: #f59e0b;
            --color-border: #2d3149;
            --radius: 12px;
            --transition: all 0.25s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-primary);
            text-transform: uppercase;
        }

        .game-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 20px;
            flex: 1;
            padding: 20px;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        .panel {
            background-color: var(--bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--color-border);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 左カラム: ステータス */
        .status-item { margin-bottom: 15px; }
        .status-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; }
        .status-value { font-weight: bold; }
        .bar-container { background-color: var(--bg-input); border-radius: 6px; height: 12px; width: 100%; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.3s ease; }
        .bar-hp { background-color: var(--color-hp); }
        .bar-exp { background-color: var(--color-exp); }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-box { background-color: var(--bg-input); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-box .value { font-size: 1.2rem; font-weight: bold; color: var(--accent-primary); }

        /* 中央カラム: ログ & 選択肢 */
        .main-panel { grid-column: 2; display: flex; flex-direction: column; height: 100%; }
        .log-area { flex: 1; background-color: var(--bg-input); border-radius: var(--radius); padding: 15px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .log-message { animation: fadeIn 0.3s ease forwards; padding: 6px 10px; border-left: 3px solid transparent; font-size: 0.95rem; }
        .log-message.system { border-color: var(--text-muted); color: var(--text-muted); }
        .log-message.info { border-color: var(--accent-primary); }
        .log-message.combat-player { border-color: #38bdf8; }
        .log-message.combat-enemy { border-color: var(--color-hp); color: #fca5a5; }
        .log-message.reward { border-color: var(--color-gold); color: #fcd34d; }
        .log-message.danger { border-color: var(--color-hp); color: var(--color-hp); font-weight: bold; }
        .log-message.inspect { border-color: #a855f7; color: #d8b4fe; font-style: italic; background: rgba(168, 85, 247, 0.05); }

        .action-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; min-height: 80px; }

        /* ボタン */
        .btn { background-color: var(--accent-primary); color: white; border: none; border-radius: 8px; padding: 12px 20px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-danger { background-color: var(--color-hp); }
        .btn-danger:hover { background-color: #dc2626; }

        /* 右カラム: バッグ＆インベントリ */
        .storage-wrapper { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        .storage-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .item-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
        
        .item-row { background-color: var(--bg-input); border: 1px solid var(--color-border); border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.2s ease; }
        .item-clickable-name { font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #cbd5e1; transition: var(--transition); display: inline-block; }
        .item-clickable-name:hover { color: #a855f7; text-decoration: underline; }
        
        .item-btn { background-color: var(--color-border); color: var(--text-main); border: none; border-radius: 4px; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; transition: var(--transition); }
        .item-btn:hover { background-color: var(--accent-primary); }
        .empty-text { color: var(--text-muted); font-size: 0.8rem; text-align: center; margin-top: 10px; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            body { overflow: auto; height: auto; }
            .game-container { grid-template-columns: 1fr; height: auto; }
            .main-panel { order: -1; }
            .log-area { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Labyrinth Rogue</h1>
    </header>

    <div class="game-container">
        <aside class="panel">
            <h2 class="panel-title">Status</h2>
            <div class="status-item">
                <div class="status-label"><span>Name</span><span class="status-value">冒険者</span></div>
            </div>
            <div class="status-item">
                <div class="status-label"><span>HP</span><span id="char-hp-text" class="status-value">0 / 0</span></div>
                <div class="bar-container"><div id="char-hp-bar" class="bar-fill bar-hp"></div></div>
            </div>
            <div class="status-item">
                <div class="status-label"><span>EXP</span><span id="char-exp-text" class="status-value">0 / 0</span></div>
                <div class="bar-container"><div id="char-exp-bar" class="bar-fill bar-exp"></div></div>
            </div>

            <div class="stat-grid">
                <div class="stat-box"><div class="status-label" style="justify-content: center; font-size: 0.75rem;">LEVEL</div><div id="char-level" class="value">1</div></div>
                <div class="stat-box"><div class="status-label" style="justify-content: center; font-size: 0.75rem;">ATK</div><div id="char-atk" class="value">10</div></div>
            </div>
            <div class="stat-grid">
                <div class="stat-box" style="grid-column: span 2; background: rgba(99, 102, 241, 0.05); border: 1px solid rgba(99, 102, 241, 0.1);">
                    <div class="status-label" style="justify-content: center; font-size: 0.75rem;">CURRENT DEPTH</div>
                    <div id="dungeon-depth" class="value" style="color: #cbd5e1;">0階層</div>
                </div>
            </div>
        </aside>

        <main class="panel main-panel">
            <h2 class="panel-title">Adventure Log</h2>
            <div id="log-area" class="log-area"></div>
            <div id="action-area" class="action-area"></div>
        </main>

        <aside class="panel">
            <div class="storage-wrapper">
                <div class="storage-section">
                    <h2 class="panel-title" style="margin-bottom: 5px;">Bag (実用品)</h2>
                    <div id="bag-list" class="item-list"></div>
                </div>
                <div class="storage-section">
                    <h2 class="panel-title" style="margin-bottom: 5px; border-top: 1px solid var(--color-border); padding-top: 10px;">Inventory (収集品)</h2>
                    <div id="inventory-list" class="item-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // ==========================================
        // ITEM & MONSTER DATA DICTIONARIES
        // ==========================================
        const ITEMS = {
            POTION: { id: 'potion', name: '回復薬', type: 'use', effect: 30, desc: '特製の回復薬。飲むとHPが30ポイント回復する。' },
            HI_POTION: { id: 'hi_potion', name: '高級回復薬', type: 'use', effect: 75, desc: '贅沢に調合された回復薬。飲むとHPが75ポイント回復する。' },
            EXP_BOOK: { id: 'exp_book', name: '古びた経験書', type: 'exp', effect: 25, desc: '過去の英雄の知識が記された魔導書。読むと経験値を25獲得する。' },
            SWORD: { id: 'sword', name: '鉄の剣', type: 'equip', effect: 5, desc: '頑丈に鍛えられた鉄の剣。装備すると攻撃力が永続的に5上昇する。' },
            RARE_SWORD: { id: 'rare_sword', name: '魔剣レヴァテイン', type: 'equip', effect: 15, desc: '赤く揺らめく灼熱の魔剣。装備すると攻撃力が永続的に15上昇する。' },
            
            // モンスター固有ドロップ（素材・換金アイテムなど）
            SLIME_JELLY: { id: 'slime_jelly', name: 'スライムの粘液', type: 'material', desc: 'ひんやりとした緑色のゼリー状の粘液。錬金術の基本素材として重宝される。' },
            GOBLIN_EAR: { id: 'goblin_ear', name: 'ゴブリンの耳', type: 'material', desc: '討伐証明となる不気味な耳。街のギルドに持ち帰れば、何かの報酬と交換できるかもしれない。' },
            ORC_ALM: { id: 'orc_alm', name: 'オークの鉄兜', type: 'material', desc: '重厚でひび割れたオークの防具。鍛冶屋に渡せば良い鉄くずとして引き取られる。' },
            BONESHARD: { id: 'boneshard', name: '呪われた骨片', type: 'material', desc: 'かすかに闇の魔力を帯びた硬い骨の破片。不気味な儀式や呪詛の道具に使われる。' },
            DRAGON_SCALE: { id: 'dragon_scale', name: '竜の逆鱗', type: 'material', desc: '伝説の竜から剥ぎ取った至高の鱗。圧倒的な硬度を誇り、最高の防具の材料となる。' }
        };

        const ENEMIES = [
            { name: 'スライム', hp: 20, atk: 4, exp: 10, gold: 15, drops: [ { item: ITEMS.SLIME_JELLY, chance: 0.7 }, { item: ITEMS.POTION, chance: 0.2 } ] },
            { name: 'ゴブリン', hp: 35, atk: 7, exp: 18, gold: 25, drops: [ { item: ITEMS.GOBLIN_EAR, chance: 0.6 }, { item: ITEMS.EXP_BOOK, chance: 0.25 } ] },
            { name: '迷宮のオーク', hp: 60, atk: 12, exp: 35, gold: 50, drops: [ { item: ITEMS.ORC_ALM, chance: 0.6 }, { item: ITEMS.SWORD, chance: 0.2 } ] },
            { name: 'スケルトンナイト', hp: 80, atk: 16, exp: 55, gold: 70, drops: [ { item: ITEMS.BONESHARD, chance: 0.7 }, { item: ITEMS.HI_POTION, chance: 0.3 } ] },
            { name: 'ドラゴン', hp: 200, atk: 28, exp: 150, gold: 200, drops: [ { item: ITEMS.DRAGON_SCALE, chance: 1.0 }, { item: ITEMS.RARE_SWORD, chance: 0.4 } ] }
        ];

        // ==========================================
        // GAME STATE MANAGEMENT
        // ==========================================
        const GameState = {
            player: {
                level: 1, hp: 100, maxHp: 100, atk: 10, exp: 0, nextExp: 20, gold: 50,
                bag: [ { ...ITEMS.POTION }, { ...ITEMS.EXP_BOOK }, { ...ITEMS.SWORD } ], // すぐ使える物
                inventory: [] // 収集品・素材
            },
            depth: 0,
            currentEnemy: null,
            gameState: 'TITLE',

            listeners: [],
            subscribe(listener) { this.listeners.push(listener); },
            update() { this.listeners.forEach(listener => listener(this)); }
        };

        // ==========================================
        // GAME LOGIC CONTROLLER
        // ==========================================
        const GameController = {
            init() {
                UI.init();
                GameState.subscribe(UI.render);
                this.startNewGame();
            },

            startNewGame() {
                GameState.player = {
                    level: 1, hp: 100, maxHp: 100, atk: 10, exp: 0, nextExp: 20, gold: 50,
                    bag: [ { ...ITEMS.POTION }, { ...ITEMS.POTION }, { ...ITEMS.EXP_BOOK } ],
                    inventory: []
                };
                GameState.depth = 0;
                GameState.currentEnemy = null;
                GameState.gameState = 'EXPLORE';
                
                UI.clearLog();
                UI.addLog('--- 迷宮の探索が始まった。無限の闇があなたを迎え入れる。 ---', 'system', false);
                GameState.update();
            },

            explore() {
                GameState.depth++;
                const rand = Math.random();

                if (rand < 0.15) {
                    UI.addLog(`${GameState.depth}階層を進む。周囲は静まり返っている。安全に休憩がとれそうだ。`, 'info', false);
                    GameState.gameState = 'EXPLORE';
                } else if (rand < 0.45) {
                    UI.addLog(`${GameState.depth}階層の暗がりに、古びた宝箱が佇んでいるのを発見した！`, 'reward', true);
                    GameState.gameState = 'TREASURE';
                } else {
                    this.triggerCombat();
                }
                GameState.update();
            },

            triggerCombat() {
                const enemyIndex = Math.min(Math.floor(Math.random() * (1 + Math.floor(GameState.depth / 4))), ENEMIES.length - 1);
                const baseEnemy = ENEMIES[enemyIndex];
                const scale = 1 + (GameState.depth * 0.05);

                GameState.currentEnemy = {
                    name: baseEnemy.name,
                    hp: Math.floor(baseEnemy.hp * scale),
                    maxHp: Math.floor(baseEnemy.hp * scale),
                    atk: Math.floor(baseEnemy.atk * scale),
                    exp: Math.floor(baseEnemy.exp * scale),
                    gold: Math.floor(baseEnemy.gold * scale),
                    drops: baseEnemy.drops
                };

                UI.addLog(`前方から不気味な気配が迫る！【${GameState.currentEnemy.name}】が現れた！`, 'danger', true);
                GameState.gameState = 'COMBAT';
            },

            attackTurn() {
                if (GameState.gameState !== 'COMBAT' || !GameState.currentEnemy) return;

                // プレイヤーの攻撃
                const pDmg = Math.floor(GameState.player.atk * (0.9 + Math.random() * 0.3));
                GameState.currentEnemy.hp -= pDmg;
                UI.addLog(`${GameState.currentEnemy.name}に ${pDmg} のダメージを与えた！`, 'combat-player', true);

                if (GameState.currentEnemy.hp <= 0) {
                    this.winCombat();
                    return;
                }

                // 敵の反撃
                const eDmg = Math.floor(GameState.currentEnemy.atk * (0.9 + Math.random() * 0.3));
                GameState.player.hp -= eDmg;
                UI.addLog(`あなたは ${eDmg} のダメージを受けた！`, 'combat-enemy', true);

                if (GameState.player.hp <= 0) {
                    GameState.player.hp = 0;
                    this.gameOver();
                    return;
                }
                GameState.update();
            },

            flee() {
                if (Math.random() < 0.4) {
                    UI.addLog('うまく敵の隙を突いて逃げ出すことに成功した！', 'info', false);
                    GameState.currentEnemy = null;
                    GameState.gameState = 'EXPLORE';
                } else {
                    UI.addLog('逃げ出そうとしたが、敵に回り込まれてしまった！', 'combat-enemy', false);
                    const eDmg = Math.floor(GameState.currentEnemy.atk * 0.7);
                    GameState.player.hp -= eDmg;
                    UI.addLog(`背後から ${eDmg} のダメージを受けた！`, 'combat-enemy', true);
                    
                    if (GameState.player.hp <= 0) {
                        GameState.player.hp = 0;
                        this.gameOver();
                        return;
                    }
                }
                GameState.update();
            },

            winCombat() {
                const enemy = GameState.currentEnemy;
                UI.addLog(`${enemy.name}を討伐した！`, 'info', true);
                
                // コイン獲得（インベントリ直行）
                this.gainGold(enemy.gold);
                this.gainExp(enemy.exp);
                
                // 複数ドロップ判定
                enemy.drops.forEach(dropConfig => {
                    if (Math.random() < dropConfig.chance) {
                        this.acquireItem(dropConfig.item);
                    }
                });

                GameState.currentEnemy = null;
                GameState.gameState = 'EXPLORE';
                GameState.update();
            },

            openTreasure() {
                const rand = Math.random();
                if (rand < 0.3) {
                    this.gainGold(Math.floor(20 + Math.random() * 40 + (GameState.depth * 5)));
                } else if (rand < 0.6) {
                    const item = Math.random() < 0.7 ? ITEMS.POTION : ITEMS.HI_POTION;
                    this.acquireItem(item);
                } else if (rand < 0.85) {
                    this.acquireItem(ITEMS.EXP_BOOK);
                } else {
                    const item = Math.random() < 0.85 ? ITEMS.SWORD : ITEMS.RARE_SWORD;
                    this.acquireItem(item);
                }
                GameState.gameState = 'EXPLORE';
                GameState.update();
            },

            // ゴールド獲得
            gainGold(amount) {
                GameState.player.gold += amount;
                UI.addLog(`${amount} コインを手に入れた。`, 'reward', true);
                
                // インベントリ内に反映させるため擬似的に同期
                const existingGold = GameState.player.inventory.find(i => i.id === 'gold_pile');
                if (existingGold) {
                    existingGold.count = GameState.player.gold;
                }
            },

            // アイテムの獲得自動振り分け
            acquireItem(itemConfig) {
                UI.addLog(`【${itemConfig.name}】を手に入れた。`, 'reward', true);

                if (itemConfig.type === 'use' || itemConfig.type === 'equip' || itemConfig.type === 'exp') {
                    // 実用品はバッグへ
                    GameState.player.bag.push({ ...itemConfig });
                } else {
                    // 素材・収集品はスタック可能にしてインベントリへ
                    const match = GameState.player.inventory.find(i => i.id === itemConfig.id);
                    if (match) {
                        match.count++;
                    } else {
                        GameState.player.inventory.push({ ...itemConfig, count: 1 });
                    }
                }
            },

            // バッグアイテムの使用
            useBagItem(index) {
                const item = GameState.player.bag[index];
                if (!item) return;

                if (item.type === 'use') {
                    if (GameState.player.hp >= GameState.player.maxHp) {
                        UI.addLog('体力は既に満タンだ。', 'system', false);
                        return;
                    }
                    GameState.player.hp = Math.min(GameState.player.maxHp, GameState.player.hp + item.effect);
                    UI.addLog(`【${item.name}】を使用し、HPが ${item.effect} 回復した。`, 'info', true);
                    GameState.player.bag.splice(index, 1);
                } else if (item.type === 'equip') {
                    GameState.player.atk += item.effect;
                    UI.addLog(`【${item.name}】を装備し、攻撃力が永続的に ${item.effect} 上昇した。`, 'reward', true);
                    GameState.player.bag.splice(index, 1);
                } else if (item.type === 'exp') {
                    UI.addLog(`【${item.name}】を使用した。`, 'info', true);
                    GameState.player.bag.splice(index, 1);
                    this.gainExp(item.effect);
                }

                GameState.update();
            },

            gainExp(amount) {
                GameState.player.exp += amount;
                UI.addLog(`${amount} の経験値を獲得した。`, 'info', false);

                if (GameState.player.exp >= GameState.player.nextExp) {
                    GameState.player.level++;
                    GameState.player.exp -= GameState.player.nextExp;
                    GameState.player.nextExp = Math.floor(GameState.player.nextExp * 1.5);
                    
                    const hpInc = 15 + Math.floor(Math.random() * 10);
                    const atkInc = 2 + Math.floor(Math.random() * 3);
                    
                    GameState.player.maxHp += hpInc;
                    GameState.player.hp = GameState.player.maxHp;
                    GameState.player.atk += atkInc;

                    UI.addLog(`レベルが ${GameState.player.level} に上がった！`, 'reward', true);
                }
            },

            inspectItem(item) {
                UI.addLog(`[鑑定] ${item.name}: ${item.desc}`, 'inspect', false);
            },

            gameOver() {
                UI.addLog(`あなたは力尽きた。迷宮に魂が囚われた...`, 'danger', true);
                GameState.gameState = 'GAMEOVER';
                GameState.update();
            }
        };

        // ==========================================
        // UI RENDERING ENGINE & VOICE SYSTEM
        // ==========================================
        const UI = {
            init() {
                this.charHpText = document.getElementById('char-hp-text');
                this.charHpBar = document.getElementById('char-hp-bar');
                this.charExpText = document.getElementById('char-exp-text');
                this.charExpBar = document.getElementById('char-exp-bar');
                this.charLevel = document.getElementById('char-level');
                this.charAtk = document.getElementById('char-atk');
                this.dungeonDepth = document.getElementById('dungeon-depth');
                this.logArea = document.getElementById('log-area');
                this.actionArea = document.getElementById('action-area');
                this.bagList = document.getElementById('bag-list');
                this.inventoryList = document.getElementById('inventory-list');
            },

            clearLog() { this.logArea.innerHTML = ''; },

            addLog(text, type = 'info', shouldSpeak = false) {
                const msg = document.createElement('div');
                msg.className = `log-message ${type}`;
                msg.innerText = text;
                this.logArea.appendChild(msg);
                this.logArea.scrollTop = this.logArea.scrollHeight;

                // 条件に合う重要セリフだけを「普通のスピード(1.0)」でアナウンス
                if (shouldSpeak) {
                    const cleanText = text.replace(/[★\-\[\]【】]/g, '');
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 1.0;  // 人間が普通に話すスピード
                    utterance.pitch = 0.85; // 冷静なシステムボイス
                    utterance.volume = 0.8;

                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                }
            },

            render(state) {
                // 1. ステータス同期
                UI.charHpText.innerText = `${state.player.hp} / ${state.player.maxHp}`;
                UI.charHpBar.style.width = `${(state.player.hp / state.player.maxHp) * 100}%`;
                UI.charExpText.innerText = `${state.player.exp} / ${state.player.nextExp}`;
                UI.charExpBar.style.width = `${(state.player.exp / state.player.nextExp) * 100}%`;
                UI.charLevel.innerText = state.player.level;
                UI.charAtk.innerText = state.player.atk;
                UI.dungeonDepth.innerText = `${state.depth} 階層`;

                // 2. バッグの描写 (実用品)
                UI.bagList.innerHTML = '';
                if (state.player.bag.length === 0) {
                    UI.bagList.innerHTML = '<div class="empty-text">バッグは空です</div>';
                } else {
                    state.player.bag.forEach((item, idx) => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        const actionLabel = item.type === 'equip' ? '装備' : '使用';
                        
                        // 安全に変数を渡すためにonclick属性に仕込むオブジェクトをエスケープ化
                        row.innerHTML = `
                            <span class="item-clickable-name" onclick="GameController.inspectItem({name:'${item.name}', desc:'${item.desc}'})">${item.name}</span>
                            <button class="item-btn" onclick="GameController.useBagItem(${idx})">${actionLabel}</button>
                        `;
                        UI.bagList.appendChild(row);
                    });
                }

                // 3. インベントリの描写 (収集品、コインもここに統合表示)
                UI.inventoryList.innerHTML = '';
                
                // コインの表示
                const goldRow = document.createElement('div');
                goldRow.className = 'item-row';
                goldRow.innerHTML = `
                    <span class="item-clickable-name" style="color:var(--color-gold);" onclick="GameController.inspectItem({name:'コイン', desc:'迷宮内で流通している輝く金貨。今後のアップデートでショップ等で利用可能です。'})">所持コイン</span>
                    <span style="font-size:0.9rem; font-weight:bold; color:var(--color-gold);">${state.player.gold} G</span>
                `;
                UI.inventoryList.appendChild(goldRow);

                if (state.player.inventory.length > 0) {
                    state.player.inventory.forEach((item) => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `
                            <span class="item-clickable-name" onclick="GameController.inspectItem({name:'${item.name}', desc:'${item.desc}'})">${item.name}</span>
                            <span style="font-size:0.85rem; color:var(--text-muted);">x${item.count}</span>
                        `;
                        UI.inventoryList.appendChild(row);
                    });
                }

                // 4. アクションボタンの制御
                UI.actionArea.innerHTML = '';
                if (state.gameState === 'EXPLORE') {
                    UI.createActionButton('奥へ進む', () => GameController.explore());
                } else if (state.gameState === 'COMBAT') {
                    UI.createActionButton(`戦う (敵HP: ${state.currentEnemy.hp})`, () => GameController.attackTurn(), 'btn-danger');
                    UI.createActionButton('逃げる', () => GameController.flee());
                } else if (state.gameState === 'TREASURE') {
                    UI.createActionButton('宝箱を開ける', () => GameController.openTreasure());
                } else if (state.gameState === 'GAMEOVER') {
                    UI.createActionButton('タイトルに戻り再挑戦', () => GameController.startNewGame(), 'btn-danger');
                }
            },

            createActionButton(text, onClickEvent, customClass = '') {
                const btn = document.createElement('button');
                btn.className = `btn ${customClass}`;
                btn.innerText = text;
                btn.onclick = onClickEvent;
                UI.actionArea.appendChild(btn);
            }
        };

        window.onload = () => { GameController.init(); };
    </script>
</body>
</html>
